name: photo_swipe
description: A photo cleanup app with gesture-based deletion.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # 照片相关
  photo_manager: ^3.0.0

  # UI 组件
  flutter_staggered_grid_view: ^0.7.0
  photo_view: ^0.14.0

  # 工具
  uuid: ^4.2.1
  intl: ^0.19.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
