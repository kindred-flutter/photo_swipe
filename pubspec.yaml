name: photo_swipe
description: A photo cleanup app with gesture-based deletion.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # 照片相关
  photo_manager: ^3.0.0
  video_player: ^2.9.1

  # UI 组件（photo_view 和 staggered_grid_view 已用原生组件替代）

  # 工具
  uuid: ^4.2.1
  intl: ^0.19.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
